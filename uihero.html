<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Site</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow-x: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #fff;
  }

  /* ── Hero ── */
  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  .hero-content {
    position: absolute;
    top: 50%;
    left: 8%;
    transform: translateY(-50%);
    z-index: 10;
    max-width: 520px;
  }

  .hero-content h1 {
    font-size: clamp(2rem, 5vw, 3.8rem);
    font-weight: 300;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: #fff;
    margin-bottom: 1.25rem;
    text-shadow: 0 0 40px rgba(56, 136, 246, 0.35);
  }

  .hero-content h1 span {
    color: #3888F6;
  }

  .hero-content p {
    font-size: 1.05rem;
    font-weight: 300;
    line-height: 1.6;
    color: rgba(255,255,255,0.6);
    margin-bottom: 2rem;
    max-width: 380px;
  }

  .cta-btn {
    display: inline-block;
    padding: 14px 32px;
    background: transparent;
    border: 1px solid rgba(56, 136, 246, 0.55);
    color: #3888F6;
    font-size: 0.95rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, color 0.2s, box-shadow 0.2s;
  }

  .cta-btn:hover {
    background: rgba(56, 136, 246, 0.12);
    box-shadow: 0 0 30px rgba(56, 136, 246, 0.25);
    color: #fff;
  }

  .scroll-hint {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0.4;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #3888F6;
    animation: bounce 2s infinite;
  }

  .scroll-hint::after {
    content: '';
    display: block;
    width: 1px;
    height: 36px;
    background: linear-gradient(to bottom, #3888F6, transparent);
  }

  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%       { transform: translateX(-50%) translateY(6px); }
  }
</style>
</head>
<body>

<section class="hero">
  <canvas id="c"></canvas>

  <!-- ══════════════════════════════════════
       EDIT YOUR CONTENT HERE
       ══════════════════════════════════════ -->
  <div class="hero-content">
    <h1>Your headline<br><span>goes here</span></h1>
    <p>A short subheading that explains what you do and who it's for. Keep it to two lines max.</p>
    <a href="#" class="cta-btn">Book a call →</a>
  </div>

  <div class="scroll-hint">scroll</div>
</section>


<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
let mouse       = { x: 0.5, y: 0.5 };
let targetMouse = { x: 0.5, y: 0.5 };
let time = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

document.addEventListener('mousemove', e => {
  targetMouse.x = e.clientX / W;
  targetMouse.y = e.clientY / H;
});

function draw() {
  mouse.x += (targetMouse.x - mouse.x) * 0.04;
  mouse.y += (targetMouse.y - mouse.y) * 0.04;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Subtle floating particles
  for (let i = 0; i < 60; i++) {
    const px = (i * 173.7 + Math.sin(time * 0.3 + i * 0.8) * 40 + time * 8) % W;
    const py = (i * 113.1 + Math.cos(time * 0.25 + i * 1.1) * 30 + time * 5) % H;
    const pa = 0.08 + 0.06 * Math.sin(time * 1.5 + i);
    const ps = 1 + Math.sin(time + i * 0.5) * 0.5;
    ctx.beginPath();
    ctx.arc(px, py, ps, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(56, 136, 246, ${pa})`;
    ctx.fill();
  }

  const eyeCX = W * 0.65;
  const eyeCY = H * 0.5;
  const baseR = Math.min(W, H) * 0.32;

  const lookX = (mouse.x - 0.5) * baseR * 0.12;
  const lookY = (mouse.y - 0.5) * baseR * 0.08;

  // Outer ambient glow
  const ambGlow = ctx.createRadialGradient(eyeCX, eyeCY, baseR * 0.3, eyeCX, eyeCY, baseR * 2.2);
  ambGlow.addColorStop(0, 'rgba(40, 100, 210, 0.08)');
  ambGlow.addColorStop(0.5, 'rgba(25, 60, 140, 0.03)');
  ambGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = ambGlow;
  ctx.fillRect(0, 0, W, H);

  // Eye shape (almond/lenticular)
  ctx.save();
  ctx.beginPath();
  const eyeW = baseR * 1.5;
  const eyeH = baseR * 0.85;
  ctx.moveTo(eyeCX - eyeW, eyeCY);
  ctx.bezierCurveTo(
    eyeCX - eyeW * 0.5, eyeCY - eyeH,
    eyeCX + eyeW * 0.5, eyeCY - eyeH,
    eyeCX + eyeW, eyeCY
  );
  ctx.bezierCurveTo(
    eyeCX + eyeW * 0.5, eyeCY + eyeH,
    eyeCX - eyeW * 0.5, eyeCY + eyeH,
    eyeCX - eyeW, eyeCY
  );
  ctx.closePath();
  ctx.clip();

  // Sclera gradient
  const scleraGrad = ctx.createRadialGradient(
    eyeCX + lookX * 0.3, eyeCY + lookY * 0.3, 0,
    eyeCX, eyeCY, eyeW
  );
  scleraGrad.addColorStop(0, 'rgba(20,28,38,1)');
  scleraGrad.addColorStop(0.6, 'rgba(8,14,22,1)');
  scleraGrad.addColorStop(1, 'rgba(2,4,8,1)');
  ctx.fillStyle = scleraGrad;
  ctx.fill();

  // Iris
  const irisCX = eyeCX + lookX;
  const irisCY = eyeCY + lookY;
  const irisR  = baseR * 0.55;

  // Iris outer glow
  const irisGlow = ctx.createRadialGradient(irisCX, irisCY, irisR * 0.5, irisCX, irisCY, irisR * 1.4);
  irisGlow.addColorStop(0, 'rgba(56, 136, 246, 0.15)');
  irisGlow.addColorStop(0.7, 'rgba(35, 95, 200, 0.06)');
  irisGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = irisGlow;
  ctx.beginPath();
  ctx.arc(irisCX, irisCY, irisR * 1.4, 0, Math.PI * 2);
  ctx.fill();

  // Iris base disc
  const irisBase = ctx.createRadialGradient(irisCX, irisCY, 0, irisCX, irisCY, irisR);
  irisBase.addColorStop(0, 'rgba(15, 45, 95, 0.9)');
  irisBase.addColorStop(0.3, 'rgba(25, 85, 180, 0.85)');
  irisBase.addColorStop(0.65, 'rgba(45, 115, 220, 0.7)');
  irisBase.addColorStop(0.85, 'rgba(30, 85, 175, 0.6)');
  irisBase.addColorStop(1, 'rgba(12, 35, 70, 0.3)');
  ctx.beginPath();
  ctx.arc(irisCX, irisCY, irisR, 0, Math.PI * 2);
  ctx.fillStyle = irisBase;
  ctx.fill();

  // Iris radial fibers
  const fiberCount = 90;
  for (let i = 0; i < fiberCount; i++) {
    const angle = (i / fiberCount) * Math.PI * 2;
    const wobble = Math.sin(time * 0.8 + i * 2.3) * 0.03;
    const a = angle + wobble;

    const innerDist = irisR * (0.22 + Math.sin(i * 3.7 + time * 0.5) * 0.04);
    const outerDist = irisR * (0.85 + Math.sin(i * 5.1 + time * 0.7) * 0.1);

    const x1 = irisCX + Math.cos(a) * innerDist;
    const y1 = irisCY + Math.sin(a) * innerDist;
    const x2 = irisCX + Math.cos(a) * outerDist;
    const y2 = irisCY + Math.sin(a) * outerDist;

    const brightness = 0.15 + 0.12 * Math.sin(time * 1.2 + i * 1.7);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = `rgba(56, 136, 246, ${brightness})`;
    ctx.lineWidth = 1 + Math.sin(i * 2.1) * 0.5;
    ctx.stroke();
  }

  // Secondary fiber layer (thicker, fewer, slower)
  for (let i = 0; i < 30; i++) {
    const angle = (i / 30) * Math.PI * 2 + time * 0.02;
    const innerDist = irisR * 0.28;
    const outerDist = irisR * (0.7 + Math.sin(i * 4.3 + time * 0.4) * 0.15);

    const x1 = irisCX + Math.cos(angle) * innerDist;
    const y1 = irisCY + Math.sin(angle) * innerDist;
    const x2 = irisCX + Math.cos(angle) * outerDist;
    const y2 = irisCY + Math.sin(angle) * outerDist;

    const brightness = 0.06 + 0.04 * Math.sin(time * 0.9 + i * 2.5);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = `rgba(130, 190, 255, ${brightness})`;
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }

  // Iris ring details
  for (let r = 0; r < 4; r++) {
    const ringR = irisR * (0.35 + r * 0.17);
    const alpha = 0.08 + 0.04 * Math.sin(time * 0.6 + r);
    ctx.beginPath();
    ctx.arc(irisCX, irisCY, ringR, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(56, 136, 246, ${alpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Pupil
  const pupilBase = baseR * 0.16;
  const pupilPulse = 1 + Math.sin(time * 1.5) * 0.06;
  const pupilR = pupilBase * pupilPulse;

  const pupilGrad = ctx.createRadialGradient(irisCX, irisCY, 0, irisCX, irisCY, pupilR * 1.3);
  pupilGrad.addColorStop(0, 'rgba(0,0,0,1)');
  pupilGrad.addColorStop(0.7, 'rgba(0,0,0,0.98)');
  pupilGrad.addColorStop(1, 'rgba(0,20,30,0.6)');
  ctx.beginPath();
  ctx.arc(irisCX, irisCY, pupilR * 1.3, 0, Math.PI * 2);
  ctx.fillStyle = pupilGrad;
  ctx.fill();

  // Pupil edge ring
  ctx.beginPath();
  ctx.arc(irisCX, irisCY, pupilR * 1.25, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(45, 120, 220, 0.2)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Specular highlight (top-left catch light)
  const specX = irisCX - irisR * 0.25;
  const specY = irisCY - irisR * 0.3;
  const specR = irisR * 0.12;
  const specGrad = ctx.createRadialGradient(specX, specY, 0, specX, specY, specR);
  specGrad.addColorStop(0, 'rgba(255,255,255,0.6)');
  specGrad.addColorStop(0.5, 'rgba(200, 220, 255, 0.22)');
  specGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(specX, specY, specR, 0, Math.PI * 2);
  ctx.fillStyle = specGrad;
  ctx.fill();

  // Smaller secondary catch light
  const spec2X = irisCX + irisR * 0.2;
  const spec2Y = irisCY + irisR * 0.22;
  const spec2R = irisR * 0.05;
  const spec2Grad = ctx.createRadialGradient(spec2X, spec2Y, 0, spec2X, spec2Y, spec2R);
  spec2Grad.addColorStop(0, 'rgba(255,255,255,0.35)');
  spec2Grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(spec2X, spec2Y, spec2R, 0, Math.PI * 2);
  ctx.fillStyle = spec2Grad;
  ctx.fill();

  // Iris outer edge
  ctx.beginPath();
  ctx.arc(irisCX, irisCY, irisR, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(45, 115, 215, 0.25)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Limbal ring (dark ring at iris edge)
  ctx.beginPath();
  ctx.arc(irisCX, irisCY, irisR * 1.02, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,30,50,0.6)';
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.restore();

  // Eye outline (outer lids)
  ctx.beginPath();
  ctx.moveTo(eyeCX - eyeW, eyeCY);
  ctx.bezierCurveTo(
    eyeCX - eyeW * 0.5, eyeCY - eyeH,
    eyeCX + eyeW * 0.5, eyeCY - eyeH,
    eyeCX + eyeW, eyeCY
  );
  ctx.bezierCurveTo(
    eyeCX + eyeW * 0.5, eyeCY + eyeH,
    eyeCX - eyeW * 0.5, eyeCY + eyeH,
    eyeCX - eyeW, eyeCY
  );
  ctx.closePath();
  ctx.strokeStyle = 'rgba(50, 130, 235, 0.2)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Faint outer halo around eye shape
  ctx.shadowColor = 'rgba(56, 136, 246, 0.15)';
  ctx.shadowBlur = 40;
  ctx.beginPath();
  ctx.moveTo(eyeCX - eyeW, eyeCY);
  ctx.bezierCurveTo(
    eyeCX - eyeW * 0.5, eyeCY - eyeH,
    eyeCX + eyeW * 0.5, eyeCY - eyeH,
    eyeCX + eyeW, eyeCY
  );
  ctx.bezierCurveTo(
    eyeCX + eyeW * 0.5, eyeCY + eyeH,
    eyeCX - eyeW * 0.5, eyeCY + eyeH,
    eyeCX - eyeW, eyeCY
  );
  ctx.closePath();
  ctx.strokeStyle = 'rgba(50, 125, 230, 0.08)';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Vignette
  const vig = ctx.createRadialGradient(W / 2, H / 2, H * 0.35, W / 2, H / 2, H * 0.9);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.65)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  time += 0.016;
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
